name: Bug report
description: Something is broken
title: "[Bug]: "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. After you submit this, set the issue's **Type** to
        `Bug` and **Priority** field (top right) if you have permission — a maintainer
        will otherwise triage it. See docs/standards/github-issues.md for how this repo
        uses GitHub's native issue types and fields.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps, as minimal as possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
